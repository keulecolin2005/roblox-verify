<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Verification</title>
    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 16px;
            max-width: 450px;
            text-align: center;
        }
        button {
            background: #5865F2;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            width: 100%;
        }
        .loader {
            border: 3px solid #333;
            border-top: 3px solid #5865F2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success { color: #48bb78; }
        .error { color: #f56565; }
        .info-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <div id="content">
            <!-- Dynamischer Content -->
        </div>
    </div>

    <script>
        // ===== KONFIGURATION =====
        const WORKER_URL = 'https://fancy-mode-1373.keulecolin2005.workers.dev';
        const REDIRECT_URI = 'https://keulecolin2005.github.io/roblox-verify/';
        const ROBLOX_CLIENT_ID = '1529843549493669743';
        
        // ===== HELPER =====
        function showPage(type, data) {
            const content = document.getElementById('content');
            
            if (type === 'login') {
                content.innerHTML = `
                    <h2>🔗 Roblox Verification</h2>
                    <p>Klicke auf den Button, um deinen Roblox Account zu verifizieren.<br>
                    Dein Discord Nickname wird automatisch geändert.</p>
                    <button id="startBtn">🎮 Mit Roblox verifizieren</button>
                    <div class="info-box">
                        <small>⚠️ Wichtig: Du musst bereits auf dem Discord Server sein!</small>
                    </div>
                `;
                document.getElementById('startBtn').onclick = startRobloxLogin;
            }
            else if (type === 'loading') {
                content.innerHTML = `
                    <h2>⏳ Verifizierung läuft...</h2>
                    <div class="loader"></div>
                    <p>Bitte warte einen Moment...</p>
                `;
            }
            else if (type === 'success') {
                content.innerHTML = `
                    <h2 class="success">✅ Verifizierung erfolgreich!</h2>
                    <div class="info-box">
                        <p><strong>🎮 Roblox:</strong><br>${escapeHtml(data.displayName)} (@${escapeHtml(data.username)})</p>
                        <p><strong>🏷️ Neuer Nickname:</strong><br>${escapeHtml(data.nickname)}</p>
                        <p><strong>✅ Verified Rolle:</strong> Wurde hinzugefügt</p>
                    </div>
                    <button onclick="window.location.href='https://discord.com/app'">💬 Zu Discord gehen</button>
                    <button onclick="location.reload()" style="margin-top:10px;">🔄 Neue Verifizierung</button>
                `;
            }
            else if (type === 'error') {
                content.innerHTML = `
                    <h2 class="error">❌ Fehler</h2>
                    <div class="info-box">
                        <p>${escapeHtml(data.message)}</p>
                    </div>
                    <button onclick="location.reload()">🔄 Erneut versuchen</button>
                    <button onclick="window.location.href='https://discord.com/app'" style="margin-top:10px;">💬 Zu Discord</button>
                `;
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ===== ROBLOX LOGIN STARTEN =====
        function startRobloxLogin() {
            // WICHTIG: Du musst deine Discord User ID hier manuell eintragen zum Testen!
            // Oder wir machen einen Discord Login vorher...
            
            // Für den Test: Bitte deine Discord User ID hier eintragen!
            // (Rechtsklick auf deinen Namen in Discord -> "Copy ID")
            const YOUR_DISCORD_USER_ID = prompt('Bitte deine Discord User ID eingeben (Rechtsklick auf deinen Namen in Discord -> Copy ID):');
            
            if (!YOUR_DISCORD_USER_ID) {
                showPage('error', { message: 'Keine Discord ID eingegeben!' });
                return;
            }
            
            const state = encodeURIComponent(JSON.stringify({ discordId: YOUR_DISCORD_USER_ID }));
            const url = `https://apis.roblox.com/oauth/v1/authorize?client_id=${ROBLOX_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=openid+profile&state=${state}`;
            window.location.href = url;
        }
        
        // ===== ROBLOX CALLBACK VERARBEITEN =====
        async function handleRobloxCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            if (!code) {
                showPage('login');
                return;
            }
            
            showPage('loading');
            
            try {
                const response = await fetch(`${WORKER_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, state })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showPage('success', result);
                    window.history.pushState({}, '', REDIRECT_URI);
                } else {
                    showPage('error', { message: result.error || 'Unbekannter Fehler' });
                }
            } catch (err) {
                showPage('error', { message: 'Worker nicht erreichbar: ' + err.message });
            }
        }
        
        // ===== START =====
        handleRobloxCallback();
    </script>
</body>
</html>
