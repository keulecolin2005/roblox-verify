<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f1a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .success { color: #00ff88; }
        .error { color: #ff4444; }
        .loader {
            border: 4px solid #2a2a3e;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-box {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-box p { margin: 8px 0; font-size: 14px; }
        .info-box b { color: #00ff88; }
        .btn {
            display: inline-block;
            background: #5865F2;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.roblox.com/favicon.ico" alt="Roblox" class="logo">
        <h1>🔗 Roblox Verification</h1>
        <div id="content">
            <div class="loader" id="loader"></div>
            <p id="status">Verifying...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const content = document.getElementById('content');

        async function verify() {
            if (!code) {
                content.innerHTML = `
                    <h2 class="error">❌ Error</h2>
                    <p>No verification code received.</p>
                    <p style="font-size:12px;color:#888;margin-top:10px;">Please use the Verify button in Discord.</p>
                `;
                return;
            }

            try {
                const response = await fetch(
                    'https://fancy-mode-1373.keulecolin2005.workers.dev/oauth-callback?code=' + 
                    encodeURIComponent(code) + 
                    '&state=' + encodeURIComponent(state || '')
                );

                if (response.ok) {
                    const html = await response.text();
                    content.innerHTML = html;
                } else {
                    const text = await response.text();
                    content.innerHTML = `
                        <h2 class="error">❌ Verification Failed</h2>
                        <p>${text || 'Unknown error'}</p>
                        <a href="discord://-" class="btn">Return to Discord</a>
                    `;
                }
            } catch (err) {
                content.innerHTML = `
                    <h2 class="error">❌ Connection Error</h2>
                    <p>Could not connect to verification server.</p>
                    <p style="font-size:12px;color:#888;">${err.message}</p>
                `;
            }
        }

        verify();
    </script>
</body>
</html>
