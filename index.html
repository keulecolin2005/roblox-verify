<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Discord Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 48px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .icon { font-size: 72px; margin-bottom: 20px; }
        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #5865F2, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 { margin-bottom: 12px; color: #fff; }
        p { color: #a0aec0; line-height: 1.6; margin-bottom: 28px; }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid #2d3748;
            border-top-color: #5865F2;
            border-radius: 50%;
            margin: 24px auto;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success { color: #48bb78; }
        .error { color: #f56565; }
        .detail-box {
            background: rgba(15, 15, 26, 0.8);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .detail-box p { margin-bottom: 10px; }
        .detail-box strong { color: #ffd700; }
        button {
            background: linear-gradient(135deg, #5865F2, #4752c4);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 12px;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(88,101,242,0.3); }
        .btn-discord {
            background: linear-gradient(135deg, #5865F2, #4752c4);
        }
        .btn-roblox {
            background: linear-gradient(135deg, #ffffff, #e2e8f0);
            color: #1a202c;
        }
        .btn-roblox:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        hr { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 24px 0; }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 13px;
        }
        .status-online { background: #48bb7820; color: #48bb78; border: 1px solid #48bb78; }
        .footer-note { font-size: 12px; color: #718096; margin-top: 20px; }
        .discord-user-info {
            background: rgba(88, 101, 242, 0.1);
            border-radius: 16px;
            padding: 12px;
            margin: 16px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .discord-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #5865F2;
        }
        .discord-name {
            text-align: left;
        }
        .discord-name strong {
            color: white;
        }
        .discord-name small {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="card" id="app">
        <!-- Dynamischer Content -->
    </div>

    <script>
        // ===== KONFIGURATION =====
        const WORKER_URL = 'https://fancy-mode-1373.keulecolin2005.workers.dev';
        const REDIRECT_URI = 'https://keulecolin2005.github.io/roblox-verify/';
        const DISCORD_CLIENT_ID = '1503179151073345678';
        const ROBLOX_CLIENT_ID = '1529843549493669743';
        
        // ===== GLOBALE VARIABLEN =====
        let currentDiscordUser = null;
        
        // ===== HELPER =====
        function saveDiscordUser(user) {
            localStorage.setItem('discord_user', JSON.stringify(user));
            currentDiscordUser = user;
        }
        
        function loadDiscordUser() {
            const saved = localStorage.getItem('discord_user');
            if (saved) {
                try {
                    currentDiscordUser = JSON.parse(saved);
                    return currentDiscordUser;
                } catch(e) {}
            }
            return null;
        }
        
        function clearDiscordUser() {
            localStorage.removeItem('discord_user');
            currentDiscordUser = null;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ===== UI PAGES =====
        function showMainPage() {
            const app = document.getElementById('app');
            
            if (currentDiscordUser) {
                const avatarUrl = currentDiscordUser.avatar 
                    ? `https://cdn.discordapp.com/avatars/${currentDiscordUser.id}/${currentDiscordUser.avatar}.png`
                    : 'https://cdn.discordapp.com/embed/avatars/0.png';
                
                app.innerHTML = `
                    <div class="icon">🔗</div>
                    <h1>Roblox Verification</h1>
                    
                    <div class="discord-user-info">
                        <img src="${avatarUrl}" class="discord-avatar">
                        <div class="discord-name">
                            <strong>${escapeHtml(currentDiscordUser.global_name || currentDiscordUser.username)}</strong>
                            <small>@${escapeHtml(currentDiscordUser.username)}</small>
                        </div>
                    </div>
                    
                    <p>Verbinde deinen Roblox Account mit Discord.<br>
                    Dein Nickname wird automatisch geändert und du erhältst die Verified Rolle.</p>
                    
                    <button id="robloxBtn" class="btn-roblox">
                        🎮 Mit Roblox verifizieren
                    </button>
                    
                    <button id="logoutBtn" style="background: #4a5568; margin-top: 8px;">
                        🔓 Discord Logout
                    </button>
                    
                    <hr>
                    
                    <div>
                        <span class="status-badge status-online" id="apiStatus">● API Online</span>
                    </div>
                `;
                
                document.getElementById('robloxBtn').addEventListener('click', startRobloxLogin);
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    clearDiscordUser();
                    showMainPage();
                });
            } else {
                app.innerHTML = `
                    <div class="icon">🔗</div>
                    <h1>Roblox Verification</h1>
                    <p>Verifiziere deinen Roblox Account und erhalte automatisch die Verified Rolle.</p>
                    
                    <button id="discordBtn" class="btn-discord">
                        💬 Mit Discord anmelden
                    </button>
                    
                    <hr>
                    
                    <div>
                        <span class="status-badge status-online" id="apiStatus">● API Online</span>
                    </div>
                    
                    <div class="footer-note">
                        Nach der Verifizierung wird dein Discord Nickname auf<br>
                        <strong>RobloxName (@RobloxUsername)</strong> geändert.
                    </div>
                `;
                
                document.getElementById('discordBtn').addEventListener('click', startDiscordLogin);
            }
            
            checkApiStatus();
        }
        
        function showLoading(message) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="icon">⏳</div>
                <h2>${message}</h2>
                <div class="loader"></div>
                <p>Bitte warte einen Moment...</p>
            `;
        }
        
        function showSuccess(robloxData) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="icon">✅</div>
                <h2 class="success">Verifizierung erfolgreich!</h2>
                <div class="detail-box">
                    <p><strong>🎮 Roblox Profil:</strong><br>
                    <a href="https://www.roblox.com/users/${escapeHtml(robloxData.robloxId)}/profile" target="_blank">
                        ${escapeHtml(robloxData.displayName)} (@${escapeHtml(robloxData.username)})
                    </a></p>
                    <p><strong>🏷️ Neuer Discord Nickname:</strong><br>${escapeHtml(robloxData.nickname)}</p>
                    <p><strong>✅ Verified Rolle:</strong> Wurde hinzugefügt</p>
                </div>
                <button onclick="window.location.href='https://discord.com/app'">
                    💬 Zu Discord gehen
                </button>
                <button onclick="clearDiscordUser(); showMainPage();" style="margin-top: 8px; background: #4a5568;">
                    🔄 Neue Verifizierung
                </button>
                <p class="footer-note">Dein Nickname wurde automatisch aktualisiert.</p>
            `;
        }
        
        function showError(errorMsg) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="icon">❌</div>
                <h2 class="error">Fehler</h2>
                <div class="detail-box" style="border-color:#f56565;">
                    <p>${escapeHtml(errorMsg)}</p>
                </div>
                <button onclick="location.reload()">🔄 Neu starten</button>
                <button onclick="window.location.href='https://discord.com/app'" style="margin-top:12px;">💬 Zu Discord</button>
            `;
        }
        
        async function checkApiStatus() {
            const statusSpan = document.getElementById('apiStatus');
            if (!statusSpan) return;
            try {
                const response = await fetch(`${WORKER_URL}/`);
                if (response.ok) {
                    statusSpan.innerHTML = '● API Online';
                    statusSpan.style.color = '#48bb78';
                } else {
                    statusSpan.innerHTML = '● API Error';
                    statusSpan.style.color = '#f56565';
                }
            } catch (error) {
                statusSpan.innerHTML = '● API Offline';
                statusSpan.style.color = '#f56565';
            }
        }
        
        // ===== DISCORD LOGIN =====
        function startDiscordLogin() {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=identify&state=discord`;
            window.location.href = url;
        }
        
        async function handleDiscordCallback(code) {
            showLoading('Discord Login wird verarbeitet...');
            
            try {
                const response = await fetch(`${WORKER_URL}/discord-token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
                });
                
                const data = await response.json();
                
                if (data.user) {
                    saveDiscordUser(data.user);
                    window.history.pushState({}, '', REDIRECT_URI);
                    showMainPage();
                } else {
                    throw new Error('Keine Benutzerdaten erhalten');
                }
            } catch (err) {
                console.error(err);
                showError('Discord Login fehlgeschlagen: ' + err.message);
            }
        }
        
        // ===== ROBLOX LOGIN =====
        function startRobloxLogin() {
            if (!currentDiscordUser) {
                showError('Bitte zuerst mit Discord anmelden!');
                return;
            }
            
            const state = encodeURIComponent(JSON.stringify({ 
                discordId: currentDiscordUser.id,
                source: 'web'
            }));
            
            const url = `https://apis.roblox.com/oauth/v1/authorize?client_id=${ROBLOX_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=openid+profile&state=${state}`;
            window.location.href = url;
        }
        
        async function handleRobloxCallback(code, state) {
            showLoading('Roblox Verifizierung wird verarbeitet...');
            
            try {
                const response = await fetch(`${WORKER_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, state })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(result);
                    clearDiscordUser();
                } else {
                    throw new Error(result.error || 'Verifizierung fehlgeschlagen');
                }
            } catch (err) {
                console.error(err);
                showError('Roblox Verifizierung fehlgeschlagen: ' + err.message);
            }
        }
        
        // ===== HAUPTLOGIK =====
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            
            // Discord Callback
            if (code && state === 'discord') {
                await handleDiscordCallback(code);
                return;
            }
            
            // Roblox Callback
            if (code && state) {
                await handleRobloxCallback(code, state);
                return;
            }
            
            // Normaler Start
            loadDiscordUser();
            showMainPage();
        }
        
        // Start
        init();
    </script>
</body>
</html>
